name: CI

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          TOTAL=$(go test -list '.*' ./... 2>/dev/null | awk '/^Test[A-Za-z]/{n++} END{print n+0}')
          go test -race -v ./... | awk -v total="$TOTAL" '/^--- (PASS|FAIL):/{n++; printf "%s [%d/%d]\n",$0,n,total; next}{print}'
          exit ${PIPESTATUS[0]}

      - name: Coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./internal/... ./cmd/...

      - name: Upload coverage to Codecov
        if: false
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      - name: Integration tests
        run: |
          TOTAL=$(go test -tags integration -list '.*' ./test/e2e/ 2>/dev/null | awk '/^Test[A-Za-z]/{n++} END{print n+0}')
          go test -tags integration -race -timeout 25m -v ./test/e2e/ | awk -v total="$TOTAL" '/^--- (PASS|FAIL):/{n++; printf "%s [%d/%d]\n",$0,n,total; next}{print}'
          exit ${PIPESTATUS[0]}
